<!DOCTYPE html>
<html lang="en" data-color-scheme="light">

    <title>Axel Trejo - Website</title>
    <script>
      const root = document.documentElement;
      const colorScheme = window.localStorage.getItem("color-scheme");
      const media = window.matchMedia("(prefers-color-scheme: dark)");
      const mediaScheme = media.matches ? "dark" : "light";
      root.setAttribute(
        "data-color-scheme",
        colorScheme != null ? colorScheme : mediaScheme
      );
      window.addEventListener("load", () => {
        const splash = document.getElementById("splash");
        setTimeout(() => (splash.style.display = "none"), 2500);
      });
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap");
      :root[data-color-scheme="light"] {
        --background-color: #eee;
        --emphasis-color: #b9f;
        --tab-color: #fff6;
        --border-color: #fff8;
        --primary-color: #000;
        --secondary-color: #0008;
        color-scheme: light;
        & #sun {
          display: none;
        }
      }
      :root[data-color-scheme="dark"] {
        --background-color: #111;
        --emphasis-color: #324;
        --tab-color: #1116;
        --border-color: #0008;
        --primary-color: #fff;
        --secondary-color: #fff8;
        color-scheme: dark;
        & #moon {
          display: none;
        }
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Geist", sans-serif;
        scrollbar-width: thin;
        scrollbar-color: var(--secondary-color) transparent;
      }
      #background {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: -9999;
        background: radial-gradient(
          ellipse 80% 80% at 50% -20%,
          var(--emphasis-color),
          transparent
        );
        background-color: var(--background-color);
      }
      #splash {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        color: var(--primary-color);
        background: radial-gradient(
          ellipse 80% 80% at 50% -20%,
          var(--emphasis-color),
          transparent
        );
        background-color: var(--background-color);
        display: flex;
        justify-content: center;
        align-items: center;
        & svg {
          animation: float 6s ease infinite;
        }
      }
      @keyframes float {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-1rem);
        }
        100% {
          transform: translateY(0);
        }
      }
      body {
        background-color: var(--background-color);
        color: var(--primary-color);
        padding: 0.5rem;
      }
